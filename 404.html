<style>
  :root{
    --yellow:#FDC82F; --blue:#2E86C1; --red:#E85A5A; --teal:#3FC4A3; --charcoal:#3A3A3A;
    --bg:#FAF7F2; --bg-soft:#F2EDE3; --ink:#2A2A2A; --ink-soft:#555; --muted:#8A8A8A;
    --line:#E6E0D5; --card:#FFFFFF; --accent:var(--blue);
    --radius-l:28px; --radius-m:18px; --radius-s:12px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{
    background:var(--bg); color:var(--ink);
    font-family:'Poppins','Poppins Fallback',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .mono{font-family:'JetBrains Mono',ui-monospace,monospace;}
  .wrap{max-width:1360px; margin:0 auto; padding:0 48px;}

  /* ---- NAV (same as main site) ---- */
  nav.top{
    position:sticky; top:0; z-index:50;
    background: color-mix(in oklab, var(--bg) 88%, transparent);
    backdrop-filter: blur(14px);
    border-bottom:1px solid var(--line);
  }
  .nav-inner{display:flex; align-items:center; justify-content:space-between; height:82px;}
  .logo-img{height:38px; width:auto; display:block;}
  .nav-links{display:flex; gap:32px; align-items:center; font-size:14px; font-weight:500;}
  .nav-links a{
    color:var(--ink-soft); text-decoration:none; padding:6px 0;
    position:relative; transition:color .2s;
  }
  .nav-links a:hover{color:var(--ink);}
  .nav-links a::after{
    content:''; position:absolute; left:0; right:0; bottom:-4px; height:3px;
    background:var(--accent); border-radius:2px;
    transform:scaleX(0); transform-origin:left; transition:transform .25s ease;
  }
  .nav-links a:hover::after{transform:scaleX(1);}
  .nav-cta{
    display:inline-flex; align-items:center; gap:8px;
    padding:12px 22px; border-radius:12px;
    background: linear-gradient(135deg, var(--blue) 0%, #1a4d7a 100%);
    color:#fff; text-decoration:none; font-size:14px; font-weight:700;
    transition:all .25s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 8px 20px -4px rgba(46,134,193,.35), inset 0 1px 0 rgba(255,255,255,.15);
  }
  .nav-cta:hover{transform:translateY(-3px) scale(1.02);}

  /* ---- 404 CONTENT ---- */
  main{
    display:flex; align-items:center; justify-content:center;
    min-height: calc(100vh - 82px);
    padding: 80px 48px;
  }
  .error-inner{
    display:flex; flex-direction:column; align-items:center;
    text-align:center; max-width:560px; gap:0;
  }

  .error-chip{
    display:inline-flex; align-items:center; gap:10px;
    padding:8px 18px; border-radius:999px;
    border:1px solid var(--line); background:var(--card);
    font-size:12px; font-weight:500; color:var(--ink-soft);
    margin-bottom:36px;
  }

  .error-num{
    font-size:clamp(120px, 18vw, 220px);
    font-weight:900; line-height:.85; letter-spacing:-.05em;
    margin-bottom:28px;
  }
  .error-num .n4a{color:var(--yellow);}
  .error-num .n0 {color:var(--blue);}
  .error-num .n4b{color:var(--red);}

  .error-title{
    font-size:clamp(22px,3vw,32px);
    font-weight:700; letter-spacing:-.02em;
    margin-bottom:14px;
  }
  .error-sub{
    font-size:15px; line-height:1.65; color:var(--ink-soft);
    margin-bottom:48px;
  }

  .divider{
    width:100%; height:1px; background:var(--line);
    margin-bottom:40px;
  }

  .pivot-label{
    font-family:'JetBrains Mono',monospace;
    font-size:12px; letter-spacing:.12em; text-transform:uppercase;
    color:var(--muted); margin-bottom:16px;
  }

  .pivot-btn{
    display:inline-flex; align-items:center; gap:12px;
    padding:16px 32px; border-radius:14px;
    background:var(--ink); color:var(--bg);
    font-size:16px; font-weight:700; text-decoration:none;
    transition:transform .2s, background .2s;
    margin-bottom:16px;
    border:none; cursor:pointer; font-family:inherit;
  }
  .pivot-btn:hover{transform:translateY(-2px);}

  .back-link{
    font-size:14px; color:var(--muted); text-decoration:none;
    transition:color .2s;
  }
  .back-link:hover{color:var(--ink);}

  /* ---- TANGRAM BACKGROUND (logo style) ---- */
  .origami-bg{
    position:fixed; inset:0; z-index:0;
    overflow:hidden; pointer-events:none;
  }
  .piece{
    position:absolute; opacity:.55;
    animation: floaty 12s ease-in-out infinite alternate;
    will-change: transform;
  }
  @keyframes floaty{
    from{ transform: translateY(0)     rotate(var(--rot,0deg)); }
    to  { transform: translateY(-20px) rotate(calc(var(--rot,0deg) + 3deg)); }
  }
  nav.top, main{ position:relative; z-index:1; }
  @media (prefers-reduced-motion: reduce){
    .piece{ animation:none; }
  }
</style>
<style>
/* Gruva &amp; Idégarasjen-dropdown i nav */
.nav-dd{ position:relative; display:inline-flex; align-items:center; }
.nav-dd-btn{
  display:inline-flex; align-items:center; gap:6px;
  background:none; border:0; cursor:pointer; font-family:inherit;
  font-size:14px; font-weight:500; color:var(--ink-soft);
  padding:6px 0; transition:color .2s;
}
.nav-dd-btn .dd-caret{ font-size:10px; transition:transform .2s; }
.nav-dd:hover .nav-dd-btn, .nav-dd-btn.active{ color:var(--ink); }
.nav-dd:hover .dd-caret{ transform:rotate(180deg); }
.nav-dd::after{ content:''; position:absolute; top:100%; left:0; right:0; height:14px; }
.nav-dd-menu{
  position:absolute; top:100%; left:50%; transform:translateX(-50%) translateY(10px);
  min-width:190px; background:var(--card,#fff); border:1px solid var(--line,#E6E0D5);
  border-radius:14px; padding:8px; display:flex; flex-direction:column; gap:2px;
  box-shadow:0 18px 40px -18px rgba(0,0,0,.28);
  opacity:0; visibility:hidden; pointer-events:none;
  transition:opacity .2s ease, transform .2s ease; z-index:60;
}
.nav-dd:hover .nav-dd-menu{ opacity:1; visibility:visible; pointer-events:auto; transform:translateX(-50%) translateY(8px); }
@media (max-width: 600px){
  .nav-dd-menu{ left:0; transform:translateY(10px); }
  .nav-dd:hover .nav-dd-menu{ transform:translateY(8px); }
}
.nav-dd-menu a{
  display:block; padding:10px 14px; border-radius:9px;
  font-size:14px; font-weight:500; color:var(--ink-soft); text-decoration:none;
  white-space:nowrap; transition:background .15s, color .15s;
}
.nav-dd-menu a::after{ display:none !important; }
.nav-dd-menu a:hover{ background:var(--bg-soft,#F2EDE3); color:var(--ink); }
</style>
